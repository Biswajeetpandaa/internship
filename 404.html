<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | InternHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--gradient-dark);
    }

    .error-404 {
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 900;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .error-emoji {
      font-size: 5rem;
      animation: float-404 3s ease-in-out infinite;
      display: block;
    }

    .quick-links a {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text-light);
      padding: .5rem 1rem;
      border-radius: 50px;
      font-size: .85rem;
      text-decoration: none;
      transition: var(--transition);
      margin: .25rem;
    }

    .quick-links a:hover {
      border-color: var(--primary);
      color: #fff;
      background: rgba(102, 126, 234, .15);
    }
  </style>
</head>

<body>
  <div class="error-page">
    <div class="container text-center">
      <span class="error-emoji">??</span>
      <div class="error-404 my-3">404</div>
      <h1 class="fw-bold mb-2" style="font-size:clamp(1.5rem,4vw,2.2rem)">Houston, We Have a Problem!</h1>
      <p class="text-muted-light mb-4 mx-auto" style="max-width:450px">The page you're looking for has gone on its own
        internship. It might have moved, been removed, or the URL could be wrong.</p>

      <div class="d-flex justify-content-center flex-wrap gap-3 mb-5">
        <a href="index.html" class="btn btn-primary-grad btn-lg px-5 ripple-btn"><i
            class="bi bi-house-fill me-2"></i>Back to Home</a>
        <a href="internships.html" class="btn btn-outline-light-grad btn-lg px-5"><i
            class="bi bi-briefcase-fill me-2"></i>Browse Internships</a>
      </div>

      <p class="text-muted-light fs-sm mb-2">Or navigate to:</p>
      <div class="quick-links">
        <a href="register.html"><i class="bi bi-person-plus"></i> Register</a>
        <a href="login.html"><i class="bi bi-box-arrow-in-right"></i> Login</a>
        <a href="online_test.html"><i class="bi bi-card-checklist"></i> Take Test</a>
        <a href="student_dashbord.html"><i class="bi bi-grid"></i> Dashboard</a>
        <a href="learning_resources.html"><i class="bi bi-book"></i> Learning</a>
        <a href="contact.html"><i class="bi bi-envelope"></i> Contact</a>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Theme Toggle -->
    <script src="js/theme.js"></script>
</body>

</html>
